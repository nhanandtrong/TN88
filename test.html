<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Dice - Chẵn Lẻ Vui Nhộn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #1a1a2e;
            /* Tạo nền trời đêm pixel với các vì sao */
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-size: 200px 200px;
            color: #ecf0f1;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Hiệu ứng mây pixel đơn giản trôi qua */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
        }

        .pixel-border {
            box-shadow: 
                0 -4px 0 0 #000,
                0 4px 0 0 #000,
                -4px 0 0 0 #000,
                4px 0 0 0 #000;
        }

        .pixel-btn {
            position: relative;
            display: inline-block;
            padding: 15px 20px;
            background: #e74c3c;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            user-select: none;
            box-shadow: inset -4px -4px 0px 0px #c0392b;
            border: 4px solid #000;
        }

        .pixel-btn:active {
            transform: translateY(4px);
            box-shadow: inset -2px -2px 0px 0px #c0392b;
        }

        .pixel-btn.blue { background: #3498db; box-shadow: inset -4px -4px 0px 0px #2980b9; }
        .pixel-btn.yellow { background: #f1c40f; color: #333; box-shadow: inset -4px -4px 0px 0px #f39c12; }

        #bowl-container {
            position: relative;
            width: 220px;
            height: 140px;
            margin: 0 auto;
            z-index: 20;
        }

        .bowl {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #e0e0e0;
            border-radius: 10px 10px 120px 120px;
            border: 8px solid #7f8c8d;
            box-shadow: inset -10px -5px 0px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center bottom;
        }

        /* Khi mở bát: Đẩy tô lên cao và xoay ra xa */
        .bowl.flipped {
            transform: translate(150px, -200px) rotate(45deg);
            opacity: 0.8;
        }

        .shake {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -2px) rotate(-2deg); }
            50% { transform: translate(-4px, 0px) rotate(2deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }

        .dice {
            width: 60px;
            height: 60px;
            background: white;
            border: 5px solid black;
            position: absolute;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 5px;
            z-index: 10;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        .dot {
            background: #e74c3c; /* Chấm đỏ cho phong cách Á Đông */
            border-radius: 50%;
            width: 10px;
            height: 10px;
            align-self: center;
            justify-self: center;
        }

        .dot-black {
            background: #2c3e50;
        }

        #message-box {
            min-height: 80px;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid #f1c40f;
        }

        .score-board {
            background: #16213e;
            padding: 15px;
            border: 4px solid #4834d4;
            width: 100%;
            max-width: 450px;
        }

        /* Thêm bóng đổ dưới tô cho cảm giác đặt trên bàn */
        .table-surface {
            position: absolute;
            bottom: -20px;
            width: 260px;
            height: 40px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            z-index: 1;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="clouds"></div>

    <div class="score-board pixel-border mb-8 flex justify-between items-center">
        <div>💰: <span id="coins" class="text-yellow-400">1000</span></div>
        <div class="text-[10px]">THẮNG: <span id="wins" class="text-green-400">0</span></div>
    </div>

    <div class="text-center mb-4">
        <h1 class="text-xl mb-6 text-white tracking-tighter" style="text-shadow: 4px 4px #e74c3c;">LẮC CÁI TÔ 🎲</h1>
        <div id="message-box" class="p-4 pixel-border text-yellow-400 mb-6 flex items-center justify-center text-center">
            CHỌN CỬA ĐẶT CƯỢC!
        </div>
    </div>

    <div id="game-area" class="relative mb-16 flex items-center justify-center h-48 w-full">
        <!-- Shadow -->
        <div class="table-surface"></div>
        
        <!-- Dice 1 -->
        <div id="dice1" class="dice" style="left: calc(50% - 70px); top: 60px;"></div>
        <!-- Dice 2 -->
        <div id="dice2" class="dice" style="left: calc(50% + 10px); top: 60px;"></div>
        
        <!-- The Bowl -->
        <div id="bowl-container">
            <div id="bowl" class="bowl flex flex-col items-center justify-center">
                <!-- Họa tiết trên tô -->
                <div class="w-16 h-16 border-4 border-gray-400 rounded-full opacity-30 flex items-center justify-center">
                    <div class="text-2xl">🐉</div>
                </div>
            </div>
        </div>
    </div>

    <div id="controls" class="grid grid-cols-2 gap-6 w-full max-w-md">
        <div id="bet-chan" class="pixel-btn blue" onclick="playGame('chan')">CHẴN</div>
        <div id="bet-le" class="pixel-btn yellow" onclick="playGame('le')">LẺ</div>
    </div>

    <div class="mt-12 text-[10px] text-gray-400 uppercase tracking-widest">Pixel Casino Engine v2.0</div>

    <script>
        let coins = 1000;
        let wins = 0;
        let isPlaying = false;

        const dicePatterns = {
            1: [4],
            2: [0, 8],
            3: [0, 4, 8],
            4: [0, 2, 6, 8],
            5: [0, 2, 4, 6, 8],
            6: [0, 2, 3, 5, 6, 8]
        };

        function drawDice(id, value) {
            const diceEl = document.getElementById(id);
            diceEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const dot = document.createElement('div');
                if (dicePatterns[value].includes(i)) {
                    // Xúc sắc pixel thường có nút 1 và 4 màu đỏ
                    dot.className = (value === 1 || value === 4) ? 'dot' : 'dot dot-black';
                }
                diceEl.appendChild(dot);
            }
        }

        function updateUI() {
            document.getElementById('coins').innerText = coins;
            document.getElementById('wins').innerText = wins;
        }

        function showMessage(text, color = 'yellow') {
            const msgBox = document.getElementById('message-box');
            msgBox.innerText = text;
            const colors = {
                'yellow': '#f1c40f',
                'green': '#2ecc71',
                'red': '#ff4757',
                'white': '#ffffff'
            };
            msgBox.style.color = colors[color] || colors.yellow;
        }

        async function playGame(choice) {
            if (isPlaying) return;
            if (coins < 100) {
                showMessage("HẾT TIỀN RỒI! ĐÂY 500 XU LÀM LẠI CUỘC ĐỜI.", "red");
                coins += 500;
                updateUI();
                return;
            }

            isPlaying = true;
            coins -= 100;
            updateUI();

            const bowl = document.getElementById('bowl');
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const sum = d1 + d2;
            const result = sum % 2 === 0 ? 'chan' : 'le';

            // Đậy tô lại và bắt đầu lắc
            bowl.classList.remove('flipped');
            await new Promise(r => setTimeout(r, 300));
            
            showMessage("ĐANG LẮC... HỒI HỘP QUÁ!", "white");
            bowl.classList.add('shake');
            
            // Xáo xúc sắc ảo
            let shuffle = setInterval(() => {
                drawDice('dice1', Math.floor(Math.random() * 6) + 1);
                drawDice('dice2', Math.floor(Math.random() * 6) + 1);
            }, 80);

            await new Promise(r => setTimeout(r, 2000));

            clearInterval(shuffle);
            bowl.classList.remove('shake');
            
            // Chốt số
            drawDice('dice1', d1);
            drawDice('dice2', d2);

            showMessage("MỞ BÁT NÈ !!!", "yellow");
            await new Promise(r => setTimeout(r, 400));
            
            // HIỆU ỨNG MỚI: Kéo cái tô ra luôn
            bowl.classList.add('flipped');

            await new Promise(r => setTimeout(r, 600));

            const resultText = result === 'chan' ? 'CHẴN' : 'LẺ';
            if (choice === result) {
                coins += 200;
                wins++;
                showMessage(`${d1} + ${d2} = ${sum} (${resultText})\nQUÁ ĐỈNH! +200 XU`, "green");
            } else {
                showMessage(`${d1} + ${d2} = ${sum} (${resultText})\nTHUA RỒI! ĐEN THÔI ĐỎ QUÊN ĐI.`, "red");
            }

            updateUI();
            isPlaying = false;
        }

        window.onload = () => {
            drawDice('dice1', 1);
            drawDice('dice2', 1);
        };
    </script>
</body>
</html>
