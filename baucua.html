<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bầu Cua Pixel Art - Jackpot Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --accent-color: #fbbf24;
            --pixel-size: 4px;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Dự đoán Corner - Đưa ra ngoài bàn cược (Absolute to Body) */
        #prediction-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 180px;
            background: rgba(15, 23, 42, 0.95);
            border: 3px solid transparent;
            border-image: linear-gradient(to bottom right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff) 1;
            padding: 12px;
            z-index: 1000;
            font-size: 8px;
            line-height: 1.6;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            animation: borderRotate 3s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .predict-btn {
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            color: #fff;
            border: none;
            padding: 8px;
            width: 100%;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            margin-top: 10px;
            font-size: 7px;
            box-shadow: 0 3px 0 #92400e;
            text-shadow: 1px 1px #000;
        }

        .predict-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #92400e;
        }

        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            background: #0c4a6e;
            border: 8px solid #475569;
            image-rendering: pixelated;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slot {
            border: 2px dashed rgba(251, 191, 36, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.3s;
        }

        .slot:hover {
            background: rgba(251, 191, 36, 0.1);
            cursor: pointer;
        }

        .slot-label {
            font-size: 10px;
            margin-top: 60px;
            color: var(--accent-color);
            text-shadow: 2px 2px #000;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            background: #e11d48;
            border: none;
            padding: 15px 30px;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9f1239;
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #9f1239;
        }

        button:disabled {
            background: #4b5563;
            box-shadow: 0 6px 0 #1f2937;
            cursor: not-allowed;
        }

        .status-panel {
            margin-bottom: 10px;
            font-size: 12px;
            color: #38bdf8;
            display: flex;
            gap: 30px;
        }

        #result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .dice-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .dice-result {
            width: 80px;
            height: 80px;
            background: white;
            border: 4px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .pixel-entity {
            position: absolute;
            font-size: 40px;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.5));
            transform-origin: center center;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            pointer-events: none;
            z-index: 110;
        }

        .win-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 3px 3px 0 #000;
            pointer-events: none;
            z-index: 120;
        }

        #jackpot-notice {
            position: fixed;
            top: 20%;
            font-size: 40px;
            color: #fbbf24;
            text-shadow: 4px 4px 0 #b45309, -2px -2px 0 #fff;
            display: none;
            z-index: 200;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <!-- Prediction Panel moved outside game-container for better reach -->
    <div id="prediction-panel">
        <div style="color: #fbbf24; border-bottom: 1px solid #fff; padding-bottom: 4px; margin-bottom: 4px; font-weight: bold;">TIÊN TRI VIP</div>
        <div id="predict-info" style="color: #6ee7b7; font-size: 7px; margin-bottom: 4px;">Ưu đãi: <span id="promo-count">10</span> lượt đầu</div>
        <div id="predict-content" style="color: #fff;">Mua tin: <span id="predict-price">100</span>$</div>
        <button class="predict-btn" onclick="buyPrediction()">XEM TRƯỚC</button>
    </div>

    <div class="status-panel">
        <div>TIỀN: <span id="balance" style="color: #fbbf24;">1000</span>$</div>
        <div id="bet-total" style="color: #ef4444;">CƯỢC: 0$</div>
    </div>

    <div id="jackpot-notice">JACKPOT!!!</div>

    <div id="game-container">
        <div id="bubbles-container"></div>
        
        <div class="board">
            <div class="slot" data-type="bau" onclick="placeBet('bau', 50)">
                <div class="slot-label">BẦU</div>
            </div>
            <div class="slot" data-type="cua" onclick="placeBet('cua', 50)">
                <div class="slot-label">CUA</div>
            </div>
            <div class="slot" data-type="tom" onclick="placeBet('tom', 50)">
                <div class="slot-label">TÔM</div>
            </div>
            <div class="slot" data-type="ca" onclick="placeBet('ca', 50)">
                <div class="slot-label">CÁ</div>
            </div>
            <div class="slot" data-type="ga" onclick="placeBet('ga', 50)">
                <div class="slot-label">GÀ</div>
            </div>
            <div class="slot" data-type="nai" onclick="placeBet('nai', 50)">
                <div class="slot-label">NAI</div>
            </div>
        </div>

        <div id="result-overlay">
            <div id="win-status" style="color: #fbbf24; margin-bottom: 20px; font-size: 18px;">ĐANG LẮC...</div>
            <div class="dice-container" id="dice-results"></div>
            <button id="continue-btn" style="display: none;" onclick="closeResult()">TIẾP TỤC</button>
        </div>
    </div>

    <div class="controls">
        <button id="roll-btn" onclick="roll()">LẮC BẦU CUA!</button>
        <button style="background: #475569; box-shadow: 0 6px 0 #1e293b;" onclick="resetBets()">XÓA CƯỢC</button>
    </div>

    <script>
        const entities = {
            bau: '🎃',
            cua: '🦀',
            tom: '🦐',
            ca: '🐟',
            ga: '🐓',
            nai: '🦌'
        };

        const entityNames = {
            bau: 'Bầu',
            cua: 'Cua',
            tom: 'Tôm',
            ca: 'Cá',
            ga: 'Gà',
            nai: 'Nai'
        };

        let balance = 1000;
        let totalBet = 0;
        let currentBets = [];
        let isRolling = false;
        let nextResult = null;
        let predictionCount = 0;

        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for(let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = Math.random() * 8 + 4;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.top = Math.random() * 100 + '%';
                container.appendChild(b);
                gsap.to(b, { y: -150, opacity: 0, duration: 3 + Math.random() * 2, repeat: -1, delay: Math.random() * 5, ease: "none" });
            }
        }

        function buyPrediction() {
            const currentPrice = predictionCount < 10 ? 100 : 1000;
            
            if (balance < currentPrice) {
                const panel = document.getElementById('prediction-panel');
                gsap.to(panel, { x: 10, repeat: 5, yoyo: true, duration: 0.05 });
                spawnWinText("KHÔNG ĐỦ TIỀN!", "#ff4444");
                return;
            }

            balance -= currentPrice;
            predictionCount++;
            updateUI();

            if (!nextResult) {
                const keys = Object.keys(entities);
                nextResult = [
                    keys[Math.floor(Math.random() * keys.length)],
                    keys[Math.floor(Math.random() * keys.length)],
                    keys[Math.floor(Math.random() * keys.length)]
                ];
            }

            const topCon = nextResult[0];
            const secondCon = nextResult[1];
            const thirdCon = nextResult[2];

            const content = document.getElementById('predict-content');
            content.innerHTML = `
                <span style="color: #fbbf24">${entityNames[topCon]}</span>: 50%<br>
                <span style="color: #38bdf8">${entityNames[secondCon]}</span>: 20%<br>
                <span style="color: #f472b6">${entityNames[thirdCon]}</span>: 10%
            `;
            
            gsap.fromTo(content, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3 });
            updatePredictPriceDisplay();
        }

        function createFirework(x, y) {
            const colors = ['#ff0044', '#00ffcc', '#ffff00', '#ff00ff', '#ffffff'];
            for(let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.getElementById('game-container').appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 100;
                
                gsap.to(p, {
                    x: Math.cos(angle) * velocity,
                    y: Math.sin(angle) * velocity,
                    opacity: 0,
                    duration: 1 + Math.random(),
                    onComplete: () => p.remove()
                });
            }
        }

        function spawnWinText(text, color) {
            const t = document.createElement('div');
            t.className = 'win-text';
            t.innerText = text;
            t.style.color = color;
            t.style.left = '50%';
            t.style.top = '40%';
            t.style.transform = 'translate(-50%, -50%)';
            document.getElementById('game-container').appendChild(t);

            gsap.fromTo(t, { scale: 0, y: 0 }, { 
                scale: 1.5, 
                y: -100, 
                duration: 1, 
                ease: "back.out(2)",
                onComplete: () => {
                    gsap.to(t, { opacity: 0, delay: 0.5, onComplete: () => t.remove() });
                }
            });
        }

        function getSlotCenter(type) {
            const slot = document.querySelector(`.slot[data-type="${type}"]`);
            const rect = slot.getBoundingClientRect();
            const containerRect = document.getElementById('game-container').getBoundingClientRect();
            return {
                x: (rect.left - containerRect.left) + (rect.width / 2) - 20,
                y: (rect.top - containerRect.top) + (rect.height / 2) - 20
            };
        }

        function placeBet(type, amount) {
            if (isRolling || balance < amount) return;

            balance -= amount;
            totalBet += amount;
            updateUI();

            const entity = document.createElement('div');
            entity.className = 'pixel-entity';
            entity.innerText = entities[type];
            document.getElementById('game-container').appendChild(entity);

            const target = getSlotCenter(type);
            const startPos = getStartPos(type);
            const driftX = (Math.random() - 0.5) * 40;
            const driftY = (Math.random() - 0.5) * 40;

            gsap.set(entity, { x: startPos.x, y: startPos.y });

            gsap.to(entity, { x: target.x + driftX, y: target.y + driftY, duration: 0.6, ease: "back.out(1.7)" });

            currentBets.push({ type, element: entity, amount: amount });
        }

        function getStartPos(type) {
            if (type === 'cua') return { x: -60, y: 150 };
            if (type === 'ca') return { x: 660, y: 300 };
            if (type === 'tom') return { x: 300, y: 460 };
            return { x: 300, y: -60 };
        }

        function roll() {
            if (isRolling || currentBets.length === 0) return;
            isRolling = true;
            document.getElementById('roll-btn').disabled = true;
            document.getElementById('result-overlay').style.display = 'flex';
            document.getElementById('win-status').innerText = "ĐANG LẮC...";
            document.getElementById('continue-btn').style.display = 'none';
            document.getElementById('dice-results').innerHTML = '';

            gsap.to("#game-container", {
                x: 8, y: 8, duration: 0.05, repeat: 40, yoyo: true,
                onComplete: () => {
                    gsap.set("#game-container", { x: 0, y: 0 });
                    showResult();
                }
            });
        }

        function showResult() {
            const keys = Object.keys(entities);
            const results = nextResult || [
                keys[Math.floor(Math.random() * keys.length)],
                keys[Math.floor(Math.random() * keys.length)],
                keys[Math.floor(Math.random() * keys.length)]
            ];

            const diceContainer = document.getElementById('dice-results');
            results.forEach((res, index) => {
                const d = document.createElement('div');
                d.className = 'dice-result';
                d.style.opacity = '0';
                d.innerText = entities[res];
                diceContainer.appendChild(d);
                gsap.to(d, { opacity: 1, scale: 1, delay: index * 0.4, duration: 0.5, startAt: { scale: 4 }, ease: "elastic.out(1, 0.3)" });
            });

            setTimeout(() => {
                processWinnings(results);
                document.getElementById('continue-btn').style.display = 'block';
                nextResult = null;
                document.getElementById('predict-content').innerText = "Mua tin...";
            }, 1500);
        }

        function processWinnings(results) {
            let winAmount = 0;
            let maxMatch = 0;
            
            const betMap = {};
            currentBets.forEach(b => {
                betMap[b.type] = (betMap[b.type] || 0) + b.amount;
            });

            for (const type in betMap) {
                const count = results.filter(r => r === type).length;
                if (count > 0) {
                    winAmount += betMap[type] * (count + 1);
                    if (count > maxMatch) maxMatch = count;
                }
            }

            if (winAmount > 0) {
                document.getElementById('win-status').innerText = `BẠN THẮNG: +${winAmount}$`;
                createFirework(300, 200);
                if (maxMatch === 3) {
                    balance += 9999;
                    document.getElementById('jackpot-notice').style.display = 'block';
                    setTimeout(() => document.getElementById('jackpot-notice').style.display = 'none', 3000);
                }
            } else {
                document.getElementById('win-status').innerText = "CHÚC MAY MẮN LẦN SAU!";
            }

            balance += winAmount;
            checkResurrection();
            updateUI();
        }

        function checkResurrection() {
            if (balance <= 0 && currentBets.length === 0) {
                balance = 500;
                spawnWinText("HỒI SINH: +500$", "#10b981");
            }
        }

        function updatePredictPriceDisplay() {
            const promoLeft = 10 - predictionCount;
            const price = predictionCount < 10 ? 100 : 1000;
            
            const promoEl = document.getElementById('promo-count');
            if (promoEl) promoEl.innerText = Math.max(0, promoLeft);
            
            const priceEl = document.getElementById('predict-price');
            if (priceEl) priceEl.innerText = price;
            
            const infoEl = document.getElementById('predict-info');
            if (promoLeft <= 0 && infoEl) {
                infoEl.innerText = "Hết ưu đãi VIP!";
                infoEl.style.color = "#ef4444";
            }
        }

        function closeResult() {
            document.getElementById('result-overlay').style.display = 'none';
            resetBets();
            isRolling = false;
            document.getElementById('roll-btn').disabled = false;
        }

        function resetBets() {
            currentBets.forEach(bet => {
                gsap.to(bet.element, { opacity: 0, scale: 0, duration: 0.3, onComplete: () => bet.element.remove() });
            });
            currentBets = [];
            totalBet = 0;
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('bet-total').innerText = `CƯỢC: ${totalBet}$`;
            checkResurrection();
        }

        window.onload = () => {
            createBubbles();
            updateUI();
            updatePredictPriceDisplay();
        };
    </script>
</body>
</html>
